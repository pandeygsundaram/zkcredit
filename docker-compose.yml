version: '3.8'

services:
  oracle:
    build:
      context: .
      target: oracle-server
    container_name: zkcredit-oracle
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=production
      - PORT=8787
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8787/agents"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: zkcredit-frontend
    ports:
      - "3000:80"
    depends_on:
      - oracle
    restart: unless-stopped

  # Development mode - uncomment to use
  # dev:
  #   build:
  #     context: .
  #     target: development
  #   container_name: zkcredit-dev
  #   ports:
  #     - "8787:8787"
  #     - "5173:5173"
  #   volumes:
  #     - .:/app
  #     - /app/node_modules
  #     - /app/frontend/node_modules
  #   env_file:
  #     - .env
  #   command: sh -c "node offchain/oracle-server.js & cd frontend && npm run dev -- --host"

networks:
  default:
    name: zkcredit-network
